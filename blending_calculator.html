<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2,3-BDO 블렌딩 비율 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        /* 자동 계산된 결과 값 강조 */
        input:read-only {
            background-color: #eef2ff;   /* indigo-50 */
            border-color: #c7d2fe;       /* indigo-200 */
            color: #4338ca;              /* indigo-700 */
            font-weight: 600;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 text-slate-800">
    <div class="bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-6 sm:p-8 w-full max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <span class="inline-flex items-center rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-inset ring-indigo-200">
                BioProcess Lab
            </span>
            <h1 class="mt-3 text-2xl font-bold text-slate-900">2,3-BDO 블렌딩 비율 계산기</h1>
            <p class="mt-2 text-sm text-slate-500">
                5개 항목 중 <span class="font-medium text-slate-700">4개를 입력</span>하면 나머지 1개가 자동으로 계산됩니다.
            </p>
        </div>

        <div class="space-y-4">
            <!-- Feed A -->
            <div class="rounded-xl border border-slate-200 p-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="h-2.5 w-2.5 rounded-full bg-indigo-500"></span>
                    <h2 class="text-base font-semibold text-slate-800">Feed A</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="mesoA" class="block text-sm font-medium text-slate-600 mb-1">meso 비율 (%)</label>
                        <input type="number" id="mesoA" oninput="calculate()" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 p-2.5 text-sm" placeholder="예: 80">
                    </div>
                    <div>
                        <label for="massA" class="block text-sm font-medium text-slate-600 mb-1">질량 (g)</label>
                        <input type="number" id="massA" oninput="calculate()" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 p-2.5 text-sm" placeholder="예: 100">
                    </div>
                </div>
            </div>

            <!-- Feed B -->
            <div class="rounded-xl border border-slate-200 p-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="h-2.5 w-2.5 rounded-full bg-rose-500"></span>
                    <h2 class="text-base font-semibold text-slate-800">Feed B</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="mesoB" class="block text-sm font-medium text-slate-600 mb-1">meso 비율 (%)</label>
                        <input type="number" id="mesoB" oninput="calculate()" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 p-2.5 text-sm" placeholder="예: 20">
                    </div>
                    <div>
                        <label for="massB" class="block text-sm font-medium text-slate-600 mb-1">질량 (g)</label>
                        <input type="number" id="massB" oninput="calculate()" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 p-2.5 text-sm" placeholder="예: 200">
                    </div>
                </div>
            </div>

            <!-- Product -->
            <div class="rounded-xl border border-slate-200 p-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="h-2.5 w-2.5 rounded-full bg-teal-500"></span>
                    <h2 class="text-base font-semibold text-slate-800">Product</h2>
                </div>
                <div>
                    <label for="mesoProduct" class="block text-sm font-medium text-slate-600 mb-1">meso 목표 비율 (%)</label>
                    <input type="number" id="mesoProduct" oninput="calculate()" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 p-2.5 text-sm" placeholder="예: 50">
                </div>
            </div>

            <!-- Reset -->
            <div class="pt-2">
                <button onclick="resetInputs()" class="w-full rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 transition-colors">
                    초기화
                </button>
            </div>
        </div>

        <p class="mt-6 text-center text-xs text-slate-400">
            자동 계산된 값은 <span class="font-semibold text-indigo-600">파란색</span>으로 채워지며 수정할 수 없습니다.
        </p>
    </div>

    <script>
        // 입력 필드를 초기화하고 입력 가능 상태로 되돌리는 함수
        function resetInputs() {
            const inputs = document.querySelectorAll('input[type="number"]');
            inputs.forEach(input => {
                input.value = '';
                input.readOnly = false;
                // Placeholder를 초기 상태로 되돌립니다.
                if (input.id === 'mesoA') input.placeholder = '예: 80';
                if (input.id === 'massA') input.placeholder = '예: 100';
                if (input.id === 'mesoB') input.placeholder = '예: 20';
                if (input.id === 'massB') input.placeholder = '예: 200';
                if (input.id === 'mesoProduct') input.placeholder = '예: 50';
            });
        }

        // 계산을 수행하는 메인 함수
        function calculate() {
            // 이전에 계산된 결과가 있으면 초기화
            const inputs = document.querySelectorAll('input[type="number"]');
            inputs.forEach(input => {
                if (input.readOnly) {
                    input.value = '';
                    input.readOnly = false;
                }
            });

            // 입력된 값들을 가져오기
            const mesoA = parseFloat(document.getElementById('mesoA').value);
            const massA = parseFloat(document.getElementById('massA').value);
            const mesoB = parseFloat(document.getElementById('mesoB').value);
            const massB = parseFloat(document.getElementById('massB').value);
            const mesoProduct = parseFloat(document.getElementById('mesoProduct').value);

            // 입력된 값의 개수 확인
            const filledCount = [mesoA, massA, mesoB, massB, mesoProduct].filter(v => !isNaN(v)).length;
            if (filledCount !== 4) {
                return; // 4개의 값이 아니면 계산하지 않고 종료
            }

            // 비어있는 필드를 찾고 계산 수행
            let calculatedValue = null;
            let missingFieldId = null;

            if (isNaN(mesoA)) {
                missingFieldId = 'mesoA';
                if (massA === 0) return; // 분모가 0이면 계산 불가
                calculatedValue = ((mesoProduct * (massA + massB)) - (mesoB * massB)) / massA;
            } else if (isNaN(massA)) {
                missingFieldId = 'massA';
                if (mesoA === mesoProduct) return;
                calculatedValue = (massB * (mesoProduct - mesoB)) / (mesoA - mesoProduct);
                if (calculatedValue < 0) return; // 질량은 음수가 될 수 없음
            } else if (isNaN(mesoB)) {
                missingFieldId = 'mesoB';
                if (massB === 0) return; // 분모가 0이면 계산 불가
                calculatedValue = ((mesoProduct * (massA + massB)) - (mesoA * massA)) / massB;
            } else if (isNaN(massB)) {
                missingFieldId = 'massB';
                if (mesoB === mesoProduct) return;
                calculatedValue = (massA * (mesoA - mesoProduct)) / (mesoProduct - mesoB);
                if (calculatedValue < 0) return; // 질량은 음수가 될 수 없음
            } else if (isNaN(mesoProduct)) {
                missingFieldId = 'mesoProduct';
                const totalMesoMass = (mesoA * massA) + (mesoB * massB);
                const totalMass = massA + massB;
                if (totalMass === 0) return;
                calculatedValue = (totalMesoMass / totalMass);
            }

            // 계산된 값을 해당 입력란에 채우고, 입력 불가능 상태로 변경
            if (calculatedValue !== null) {
                const inputElement = document.getElementById(missingFieldId);
                // meso 비율은 소수점으로, 질량은 그대로 표시
                inputElement.value = calculatedValue.toFixed(2);
                inputElement.readOnly = true;
            }
        }
    </script>
</body>
</html>
